<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7E6C1"/>
      <stop offset="1" stop-color="#DDEEE7"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#F6F2E9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1B2529" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#2E5F57"/>
    </marker>
  </defs>

  <rect width="1200" height="760" rx="32" fill="url(#bg)"/>

  <text x="70" y="80" fill="#203038" font-family="Georgia, serif" font-size="34" font-weight="700">Campus Echo - Simple Working Flow</text>
  <text x="70" y="115" fill="#5F6F73" font-family="Georgia, serif" font-size="20">How the HTML page, APIs, and C server talk to each other</text>

  <rect x="70" y="170" width="280" height="160" rx="24" fill="url(#card)" stroke="#C9C2B6" filter="url(#shadow)"/>
  <text x="100" y="220" fill="#1F6F5F" font-family="Georgia, serif" font-size="26" font-weight="700">1. Compile Server</text>
  <text x="100" y="258" fill="#203038" font-family="Georgia, serif" font-size="20">Use GCC to turn</text>
  <text x="100" y="286" fill="#203038" font-family="Georgia, serif" font-size="20">server.c into a program</text>
  <text x="100" y="318" fill="#87604B" font-family="Courier New, monospace" font-size="18">gcc server.c -o server</text>

  <rect x="70" y="410" width="280" height="210" rx="24" fill="url(#card)" stroke="#C9C2B6" filter="url(#shadow)"/>
  <text x="100" y="462" fill="#1F6F5F" font-family="Georgia, serif" font-size="26" font-weight="700">2. Browser Opens</text>
  <text x="100" y="500" fill="#203038" font-family="Georgia, serif" font-size="20">User opens index.html</text>
  <text x="100" y="528" fill="#203038" font-family="Georgia, serif" font-size="20">through the server</text>
  <text x="100" y="566" fill="#203038" font-family="Georgia, serif" font-size="20">Username is saved in the</text>
  <text x="100" y="594" fill="#203038" font-family="Georgia, serif" font-size="20">browser for convenience</text>

  <rect x="460" y="170" width="300" height="220" rx="24" fill="url(#card)" stroke="#C9C2B6" filter="url(#shadow)"/>
  <text x="492" y="220" fill="#1F6F5F" font-family="Georgia, serif" font-size="26" font-weight="700">3. HTML Talks to APIs</text>
  <text x="492" y="258" fill="#203038" font-family="Georgia, serif" font-size="20">When user sends a message:</text>
  <text x="492" y="290" fill="#87604B" font-family="Courier New, monospace" font-size="18">POST /send</text>
  <text x="492" y="326" fill="#203038" font-family="Georgia, serif" font-size="20">Every 1 second the page checks:</text>
  <text x="492" y="358" fill="#87604B" font-family="Courier New, monospace" font-size="18">GET /messages</text>

  <rect x="460" y="450" width="300" height="170" rx="24" fill="url(#card)" stroke="#C9C2B6" filter="url(#shadow)"/>
  <text x="492" y="500" fill="#1F6F5F" font-family="Georgia, serif" font-size="26" font-weight="700">4. Polling</text>
  <text x="492" y="538" fill="#203038" font-family="Georgia, serif" font-size="20">Polling means the HTML page</text>
  <text x="492" y="566" fill="#203038" font-family="Georgia, serif" font-size="20">keeps asking the server</text>
  <text x="492" y="594" fill="#203038" font-family="Georgia, serif" font-size="20">for new messages again and again</text>

  <rect x="860" y="220" width="270" height="190" rx="24" fill="url(#card)" stroke="#C9C2B6" filter="url(#shadow)"/>
  <text x="892" y="270" fill="#1F6F5F" font-family="Georgia, serif" font-size="26" font-weight="700">5. C Server Works</text>
  <text x="892" y="308" fill="#203038" font-family="Georgia, serif" font-size="20">Receives requests</text>
  <text x="892" y="336" fill="#203038" font-family="Georgia, serif" font-size="20">Checks username and message</text>
  <text x="892" y="364" fill="#203038" font-family="Georgia, serif" font-size="20">Builds JSON responses</text>

  <rect x="860" y="470" width="270" height="150" rx="24" fill="url(#card)" stroke="#C9C2B6" filter="url(#shadow)"/>
  <text x="892" y="520" fill="#1F6F5F" font-family="Georgia, serif" font-size="26" font-weight="700">6. Memory Buffer</text>
  <text x="892" y="558" fill="#203038" font-family="Georgia, serif" font-size="20">Messages stay in server memory</text>
  <text x="892" y="586" fill="#203038" font-family="Georgia, serif" font-size="20">until the server stops</text>

  <path d="M350 250H440" stroke="#2E5F57" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M760 280H840" stroke="#2E5F57" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M760 545H840" stroke="#2E5F57" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M210 410V350" stroke="#2E5F57" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M610 450V410" stroke="#2E5F57" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="370" y="236" fill="#5F6F73" font-family="Georgia, serif" font-size="18">run</text>
  <text x="780" y="266" fill="#5F6F73" font-family="Georgia, serif" font-size="18">send request</text>
  <text x="772" y="532" fill="#5F6F73" font-family="Georgia, serif" font-size="18">store data</text>
  <text x="624" y="434" fill="#5F6F73" font-family="Georgia, serif" font-size="18">repeat</text>

  <text x="70" y="700" fill="#203038" font-family="Georgia, serif" font-size="22" font-weight="700">Simple idea:</text>
  <text x="195" y="700" fill="#203038" font-family="Georgia, serif" font-size="22">The browser shows the chat, the HTML calls the APIs, and the C server stores and returns the messages.</text>
</svg>
